steps:
  - group: "Set up :go:"
    key: "setup"
    steps:
      - label: ":go: Build"
        plugins:
          - docker-compose#v5.10.0:
              config: .buildkite/compose.yml
              run: golang
              command: ["go", "build", "-v", "./..."]

      - label: ":test_tube: Test"
        plugins:
          - docker-compose#v5.10.0:
              config: .buildkite/compose.yml
              run: golang
              command: ["go", "test", "-v", "./..."]

      - label: ":mag: Vet"
        plugins:
          - docker-compose#v5.10.0:
              config: .buildkite/compose.yml
              run: golang
              command: ["go", "vet", "./..."]

      - label: ":lint-roller: Lint"
        plugins:
          - docker-compose#v5.10.0:
              config: .buildkite/compose.yml
              run: golangci-lint
              command: ["golangci-lint", "run", "--timeout=5m"]
              tty: true

      - label: ":matrix: Test Matrix"
        command: ".buildkite/scripts/test-matrix | buildkite-agent pipeline upload"

  - label: "AI Assist"
    command: echo "Running Claude Code analysis"
    plugins:
      - https://github.com/mcncl/claude-code-buildkite-plugin#main:
          secret_name: "ANTHROPIC_API_KEY"
          buildkite_api_token: "$(buildkite-agent secret get BUILD_TOKEN)"
          trigger: "always"
          analysis_level: "build"

  - block: ":rocket: Release"
    key: "release"
    branches: "main"
    depends_on: "setup"
    prompt: "Choose a tag for this release"
    fields:
      - text: "Release Tag"
        key: "release-tag"
        hint: "e.g., v1.0.0"
        required: true

  - label: ":git: Create Tag"
    command: ".buildkite/scripts/tag"
    key: "create-tag"
    branches: "main"
    depends_on: "release"

  - label: ":goreleaser: Release"
    branches: "main"
    plugins:
      - docker-compose#v5.10.0:
          config: .buildkite/compose.yml
          run: goreleaser
          command: ["release", "--clean"]
          env:
            - GITHUB_TOKEN
    depends_on: "create-tag"
